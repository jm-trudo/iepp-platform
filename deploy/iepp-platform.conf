server {
    listen 80;
    server_name votre-domaine.com www.votre-domaine.com;

    # Frontend Angular (fichiers statiques du build de production)
    root /var/www/iepp-platform/frontend-dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # API Django (proxifiée vers Gunicorn, qui tourne en interne sur le port 8000)
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Admin Django
    location /admin/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Fichiers statiques Django (CSS/JS de l'admin, de Swagger)
    location /static/ {
        alias /var/www/iepp-platform/backend/staticfiles/;
    }

    # Fichiers médias (logos écoles, pièces jointes, etc.)
    location /media/ {
        alias /var/www/iepp-platform/backend/media/;
    }
}